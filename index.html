<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Counter</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            color: whitesmoke;
            background-color: aquamarine;
        }
        h1{
            text-align: center;
        }
        #container{
            
            border-top-left-radius: 50px;
            border-bottom-right-radius: 50px;
            background-image: linear-gradient(to right, rgb(53, 10, 10), rgb(11, 11, 43), rgb(53, 10, 10));
            padding: 50px 20px;
            width: 500px;
            margin: 50px auto;
            box-shadow: 10px 10px 40px 10px rgba(0, 0, 0, 0.5);
        }
        @media (max-width: 600px) {
            #container {
                width: 90%;
                flex-direction: column;
            }
            button{
                display: flex;
                width: 90%;
                margin: 10px auto;
                flex-direction: column;
            }
        }
        #myDisplay{
            font-size: 10em;
            display: block;
            text-align: center;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        #btn-container{
            text-align: center;
        }
        button{
            font-size: 1.5em;
            padding: 10px 20px;
            margin-top: 50px;
            border: none;
            border-radius: 15px;
        }
        #increaseBtn{
            background-color: rgb(36, 151, 36);
            color: white;
        }
        #resetBtn{
            background-color: orange;
            color: white;
        }
        #decreaseBtn{
            background-color: red;
            color: white;
        }
        #increaseBtn:hover{
            background-color: rgb(11, 49, 11);
            cursor: pointer;
            transform: scale(1.05);
        }
        #resetBtn:hover{
            background-color: rgb(121, 95, 44);
            cursor: pointer;
            transform: scale(1.05);
        }
        #decreaseBtn:hover{
            background-color: rgb(150, 30, 30);
            cursor: pointer;
            transform: scale(1.05);
        }

    </style>
</head>
<body>
    <div id="container">
    <h1>This is the Classic Counter</h1>
    <label id="myDisplay">0</label>
    <div id="btn-container">
        <button onclick="decreaseBtn()" id="decreaseBtn">DECREASE</button>
        <button onclick="resetBtn()" id="resetBtn">RESET</button>
        <button onclick="increaseBtn()" id="increaseBtn">INCREASE</button>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
